<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Gods - Aplicativos</title>
        <link rel="icon" type="image/png" href="Images/TheGods Studio - LOGO.png">
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="auth.css">
        <style>
            * { box-sizing: border-box; }
            body {
                margin: 0; min-height: 100vh; overflow-x: hidden;
                background: linear-gradient(135deg, #000000 0%, #005757 50%, #00a58f 100%);
                background-size: 300% 300%; animation: gradientShift 18s ease infinite;
                display: flex; align-items: center; justify-content: center; padding: 24px;
            }
            @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
            .auth-card { text-align: center; }
            .auth-title { font-size: clamp(16px, 3vw, 26px); }
            .auth-switch a { color: #fff; }
        </style>
    </head>
    <body>
        <div class="auth-wrap">
            <div class="auth-card">
                <h1 class="auth-title">APLICATIVOS</h1>
                <p class="auth-switch">Em breve: seus aplicativos e projetos aparecerão aqui.<br><br><a href="index.html">← Voltar ao início</a></p>
            </div>
        </div>
    </body>
</html>
